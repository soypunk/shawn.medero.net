<!doctype html>
<script src="//code.jquery.com/jquery-1.11.0.min.js"></script>
<!--<script src="//ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>-->
<script src="//cdnjs.cloudflare.com/ajax/libs/webshim/1.15.10/dev/polyfiller.js"></script>

<script> 
	webshim.activeLang('en');
	webshims.polyfill('forms');
	webshims.cfg.no$Switch = true;
</script>

<title>HTML5 Form Validation Test</title>

<h1>HTML5 Form Validation Test</h1>

<form id="testForm">
    <label>First Name: <input id="firstName" required></label>
    <br>
    <label>Social Security Number:<input id="ssn" required></label>
    <br>
    <input id="saveButton" type="button" value="Save">
    <input type="submit">
</form>

<script>
	$("#saveButton").click(function() {
		$("#testForm").attr("novalidate", true);
		$("#testForm").submit();
		$("#testForm").attr("novalidate", false);		
	});
</script>
