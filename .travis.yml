language: go
go:
  - 1.11
sudo: required
install:
  - sudo pip install Pygments
  - go get github.com/spf13/hugo
script: hugo
deploy:
  provider: s3
  access_key_id: $AWS_ACCESS_KEY
  secret_access_key: $AWS_SECRET_KEY
  bucket: shawn.medero.net
  region: us-west-2
  endpoint: shawn.medero.net.s3-website-us-west-2.amazonaws.com
  local-dir: public
  skip_cleanup: true
  on:
    repo: sopypunk/shawn.medero.net