{{ partial "header.html" . }}
<body lang="en">
{{ partial "subheader.html" . }}

<section id="main" role="main">
	<h1 id="title">{{ .Title }}</h1>
	{{ $data := .Data }}
    {{ range $key,$value := .Data.Terms.ByCount }}
    	<h2><a href="{{ $data.Plural }}/{{ $value.Name | urlize }}"> {{ $value.Name }} </a> {{ $value.Count }} </h2>
    {{ end }}
</section>

{{ partial "footer.html" . }}
